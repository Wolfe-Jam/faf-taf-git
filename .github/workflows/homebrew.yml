name: Update Homebrew Formula
on:
  push:
    tags: ['v*']
jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew tap update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/Wolfe-Jam/homebrew-faf/dispatches \
            -d '{"event_type":"update-formula","client_payload":{"npm_package":"faf-taf-git","version":"${{ github.ref_name }}"}}'
